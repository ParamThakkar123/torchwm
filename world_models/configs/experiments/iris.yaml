# IRIS experiment defaults. Override any key with `key=value`, e.g.:
# torchwm train iris --config world_models/configs/experiments/iris.yaml total_epochs=100 env=ALE/Breakout-v5
frame_height: 64
frame_width: 64
frame_channels: 3
vocab_size: 512
tokens_per_frame: 16
token_embedding_dim: 512
transformer_timesteps: 20
transformer_embed_dim: 256
transformer_layers: 10
transformer_heads: 4
total_epochs: 600
collection_epochs: 500
env_steps_per_epoch: 200
training_steps_per_epoch: 250
model_learning_rate: 0.0001
actor_learning_rate: 0.0001
value_learning_rate: 0.0001
collect_epsilon: 0.1
env_backend: gym
env: ALE/Pong-v5
action_repeat: 4
eval_episodes: 100
checkpoint_interval: 50
