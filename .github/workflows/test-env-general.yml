name: Environment Tests - General

permissions:
  contents: read

on:
  pull_request:
  push:
    paths:
      - 'tests/**'
      - 'world_models/envs/wrappers.py'
      - 'world_models/utils/utils.py'

jobs:
  test-general-env:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-randomly pytest-mock
        pip install gymnasium

    - name: Run general environment tests
      run: |
        pytest tests/test_env_adapters.py::test_torch_image_wrapper_accepts_env_instances_and_dict_obs -v
