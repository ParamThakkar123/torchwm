# DIAMOND experiment defaults. Override any key with `key=value`, e.g.:
# torchwm train diamond --config world_models/configs/experiments/diamond.yaml seed=1 preset=small
preset: null
game: Breakout-v5
seed: 0
obs_size: 64
frameskip: 4
max_noop: 30
terminate_on_life_loss: true
num_conditioning_frames: 4
num_epochs: 1000
training_steps_per_epoch: 400
batch_size: 32
environment_steps_per_epoch: 100
epsilon_greedy: 0.01
learning_rate: 0.0001
device: cuda
checkpoint_dir: checkpoints/diamond
