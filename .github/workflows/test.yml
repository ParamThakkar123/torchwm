name: Core Tests

permissions:
  contents: read

on:
  pull_request:
  push:
    paths:
      - 'tests/**'
      - '!tests/test_env_adapters.py'  # Environment tests run in separate workflows

jobs:
  test-core:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-randomly pytest-mock
        pip install gymnasium  # For basic environment functionality

    - name: Run core tests (excluding environment adapters)
      run: |
        pytest tests/ --tb=short --ignore=tests/test_env_adapters.py
