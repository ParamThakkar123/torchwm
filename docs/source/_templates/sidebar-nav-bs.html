{# Render root-level docs navigation so Section Navigation is not empty on leaf pages. #}
<nav class="bd-docs-nav bd-links"
     aria-label="{{ _('Section Navigation') }}">
  <p class="bd-links__title" role="heading" aria-level="1">{{ _("Section Navigation") }}</p>
  <div class="bd-toc-item navbar-nav">
    {{- generate_toctree_html(
      "sidebar",
      startdepth=0,
      show_nav_level=1,
      maxdepth=1,
      collapse=False,
      includehidden=theme_sidebar_includehidden | tobool,
      titles_only=True
      )
    -}}
  </div>
</nav>
