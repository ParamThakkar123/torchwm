# JEPA experiment defaults. Override nested keys with dot notation, e.g.:
# torchwm train jepa --config world_models/configs/experiments/jepa.yaml optimization.epochs=50 data.dataset=imagefolder
meta:
  use_bfloat16: false
  model_name: vit_base
  load_checkpoint: false
  read_checkpoint: null
  copy_data: false
  pred_depth: 6
  pred_emb_dim: 384
data:
  dataset: imagenet
  val_split: null
  batch_size: 64
  pin_mem: true
  num_workers: 8
  root_path: /data/imagenet
  image_folder: train
  crop_size: 224
  crop_scale: [0.67, 1.0]
  download: false
mask:
  allow_overlap: false
  patch_size: 16
  num_enc_masks: 1
  min_keep: 4
  enc_mask_scale: [0.15, 0.2]
  num_pred_masks: 1
  pred_mask_scale: [0.15, 0.2]
  aspect_ratio: [0.75, 1.5]
optimization:
  ema: [0.996, 1.0]
  ipe_scale: 1.0
  weight_decay: 0.04
  final_weight_decay: 0.4
  epochs: 300
  warmup: 40
  start_lr: 0.000001
  lr: 0.00015
  final_lr: 0.000001
logging:
  folder: results/jepa
  write_tag: jepa_run
  enable_wandb: false
  wandb_api_key: ""
  wandb_project: torchwm
  wandb_entity: ""
  enable_sweep: false
  sweep_config: {}
