name: Environment Tests - DMC

permissions:
  contents: read

on:
  pull_request:
  push:
    paths:
      - 'tests/**'
      - 'world_models/envs/dmc.py'

jobs:
  test-dmc:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Enable universe repository
      run: sudo add-apt-repository universe -y

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libosmesa6-dev libgl1-mesa-glx libglfw3

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-randomly pytest-mock
        pip install dm-control

    - name: Run DMC environment tests
      run: |
        pytest tests/test_env_adapters.py::test_make_env_dmc_backend -v
