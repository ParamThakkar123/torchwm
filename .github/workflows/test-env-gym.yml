name: Environment Tests - Gym

on:
  pull_request:
  push:
    paths:
      - 'tests/**'
      - 'world_models/envs/gym_env.py'

jobs:
  test-gym:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-randomly pytest-mock
        pip install gymnasium

    - name: Run Gym environment tests
      run: |
        pytest tests/test_env_adapters.py::test_make_env_gym_backend tests/test_env_adapters.py::test_gym_image_env_discrete_action_mapping -v
