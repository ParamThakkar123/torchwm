name: Pytest

permissions:
  contents: read

on:
  pull_request:
  push:
    paths:
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install -e .
        pip install pytest pytest-randomly pytest-mock

    - name: Run tests
      run: |
        pytest tests/ --ignore=tests/selenium --tb=short --timeout=30 --maxfail=5

  # mypy type checks were moved to a dedicated workflow: .github/workflows/mypy.yml
