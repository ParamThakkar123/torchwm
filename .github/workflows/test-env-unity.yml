name: Environment Tests - Unity ML-Agents

on:
  pull_request:
  push:
    paths:
      - 'tests/**'
      - 'world_models/envs/unity_env.py'

jobs:
  test-unity-mlagents:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-randomly pytest-mock
        pip install mlagents-envs

    - name: Run Unity ML-Agents environment tests
      run: |
        pytest tests/test_env_adapters.py::test_make_env_unity_backend -v
